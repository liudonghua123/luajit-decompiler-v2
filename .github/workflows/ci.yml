name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  packages: write
  actions: write
  
jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: luajit-decompiler-v2-linux
            ext: ""
            target: native
          - os: windows-latest
            artifact: luajit-decompiler-v2-windows.exe
            ext: ".exe"
            target: native
          - os: macos-latest
            artifact: luajit-decompiler-v2-macos
            ext: ""
            target: native
          - os: ubuntu-latest
            artifact: luajit-decompiler-v2-wasi.wasm
            ext: ".wasm"
            target: wasi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WASI toolchain
        if: matrix.target == 'wasi'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-20 lld-20 wasi-libc libc++-20-dev-wasm32 libc++abi-20-dev-wasm32 libclang-rt-20-dev-wasm32 || true

      - uses: jcbhmr/setup-wasmtime@v2
        if: matrix.target == 'wasi'
        with:
          version: "latest"

      - name: Configure CMake
        run: |
          if [ "${{ matrix.target }}" = "wasi" ]; then
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_WASI=ON -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20 -DCMAKE_SYSROOT=/usr -DCMAKE_C_FLAGS='--target=wasm32-wasi' -DCMAKE_CXX_FLAGS='--target=wasm32-wasi -stdlib=libc++ -fno-exceptions' -DCMAKE_EXE_LINKER_FLAGS='--target=wasm32-wasi'
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release
          fi
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Validate WASI runtime
        if: matrix.target == 'wasi'
        run: |
          wasmtime --version
          WORKSPACE_DIR=$(pwd)
          wasmtime --dir "$WORKSPACE_DIR::/mnt" build/bin/luajit-decompiler-v2 /mnt/tests/simple_test.luac -o /mnt
          ls -l simple_test.lua
          cat simple_test.lua

      - name: Prepare binary
        run: |
          mkdir dist
          if [ "${{ matrix.target }}" = "wasi" ]; then
            mv build/bin/luajit-decompiler-v2 dist/${{ matrix.artifact }}
          elif [ "${{ runner.os }}" = "Windows" ]; then
            mv build/bin/Release/luajit-decompiler-v2 dist/${{ matrix.artifact }}
          else
            mv build/bin/luajit-decompiler-v2 dist/${{ matrix.artifact }}
          fi
        shell: bash

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          tag_name: latest
          name: latest
          body: Built by CI run ${{ github.run_id }}
          draft: false
          prerelease: false

